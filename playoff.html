<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Register Playoff Matchups</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="playoff.css" />
</head>
<body>
  <h1>Playoff Matchups</h1>

  <div id="log-container">
    <h2>Output Console</h2>
    <div id="log"></div>
  </div>

  <div class="card controls">
    <div class="row">
      <label for="league">League</label>
      <select id="league">
        <option value="CL">Champions League</option>
        <option value="EL">Europa League</option>
        <option value="EC">Conference League</option>
      </select>

      <button id="load-teams-btn">Load eligible teams</button>
      <div id="eligible-count" class="muted"></div>
    </div>

    <p class="muted">
      Eligible teams = not eliminated AND no <code>playoffbonus</code> already applied.
    </p>
  </div>

  <div id="matches" class="matches"></div>

  <script type="module" src="playoff.js"></script>
</body>
</html>
