<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Leaderboard</title>
    <!-- Link to the general styles.css if it's needed -->
    <link rel="stylesheet" href="styles.css">
    <!-- Link to the leaderboard-specific CSS file -->
    <link rel="stylesheet" href="leaderboard.css">
    <!-- Firebase App (the core Firebase SDK) -->
    <script src="https://www.gstatic.com/firebasejs/9.8.1/firebase-app-compat.js"></script>
    <!-- Add Firebase products that you want to use -->
    <script src="https://www.gstatic.com/firebasejs/9.8.1/firebase-firestore-compat.js"></script>
    <!-- Link to the external JavaScript file -->
    <script src="leaderboard.js" defer></script>
</head>
<body>
    <div class="title-container">
        <h1>Leaderboard</h1>
    </div>
    <div class="leaderboard-container">
        <section class="leaderboard-highlights" aria-label="Leaderboard highlights">
            <div class="podium" id="podium"></div>
            <div class="league-winners">
                <p id="cl-winner">Champions league winner: -</p>
                <p id="el-winner">Europa league winner: -</p>
                <p id="ecl-winner">Conference league winners: -</p>
            </div>
        </section>
        <div class="leaderboard-banner" aria-label="World Championship promo banner">
            <p class="leaderboard-banner-text">🔥 Get ready for the biggest event of the year! ⚽🏆🎉</p>
            <img src="VerdensmesterskapetQR.png" alt="QR code for verdensmesterskapet.no" class="leaderboard-banner-qr">
            <p class="leaderboard-banner-link">https://verdensmesterskapet.no/</p>
        </div>

        <div class="leaderboard-controls" style="text-align:center; margin:12px 0;">
        <label for="scope-select" style="margin-right:8px;">Leaderboard:</label>
        <select id="scope-select">
        <option value="global" selected>Global</option>
        <option value="avinor">Avinor</option>
        <optgroup id="groups-optgroup" label="Team Collections"></optgroup>
        </select>
        </div>

        <table id="leaderboard-table">
            <thead>
                <tr>
                    <th>Rank</th>
                    <th>Name</th>
                    <th>Champions Selection</th>
                    <th>Europa Selection</th>
                    <th>Conference Selection</th>
                    <th data-column="championspoints">CL <img src="img/icons/championstrophy.png" alt="Champions Trophy" class="trophy-icon champions"></th>
                    <th data-column="europapoints">EL <img src="img/icons/europatrophy.png" alt="Europa Trophy" class="trophy-icon europa"></th>
                    <th data-column="conferencepoints">EC <img src="img/icons/conferencetrophy.png" alt="Conference Trophy" class="trophy-icon conference"></th>
                    <th data-column="totalpoints">Total</th>

                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <!-- Player rows will be populated here by JavaScript -->
            </tbody>
        </table>
    </div>
    <div class="button-container" style="text-align: center; margin-top: 20px;">
        <button onclick="window.location.href='stats.html'">View Stats</button>
    </div>
</body>
</html>
